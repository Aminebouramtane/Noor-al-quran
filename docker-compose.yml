services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noor-al-quran-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.local
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data:ro
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONUNBUFFERED: 1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noor-al-quran-frontend
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend
